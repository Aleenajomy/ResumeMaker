services:
  - type: web
    name: resumemaker-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DB_NAME
        fromDatabase:
          name: resumemaker-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: resumemaker-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: resumemaker-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: resumemaker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: resumemaker-db
          property: port
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: AI_MODEL
        value: gemini-2.0-flash
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: LATEX_COMPILER
        value: xelatex
      - key: LATEX_COMPILER_PATH
        value: ""
      - key: LATEX_STRICT_MODE
        value: "False"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: DEFAULT_FROM_EMAIL
        value: no-reply@resumemaker.local

databases:
  - name: resumemaker-db
    plan: starter
